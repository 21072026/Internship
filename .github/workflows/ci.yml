name: CI

on:
  # Re-enabled 2026-07-21 after the repo transfer reset the Actions quota
  # (clean 2000h/month). PR gate is cheap (~2 min); the heavy scheduled
  # workflows (e2e-full, stress, topic-preview) stay workflow_dispatch-only to
  # keep the monthly budget comfortable.
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    env:
      # Prisma client instantiates lazily; build never connects, but a valid-format URL is required.
      DATABASE_URL: 'mysql://user:pass@127.0.0.1:3306/db'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma validate
      - run: npm run lint
      - run: npx tsc --noEmit
      - name: i18n parity (EN/TR/DE)
        run: npm run check:i18n
      - run: npm run build
