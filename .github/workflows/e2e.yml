name: E2E Tests

on:
  # PAUSED (GitHub Actions quota exhausted) — auto-triggers disabled so failing
  # hosted runs stop emailing the team. Re-enable by restoring the push/
  # pull_request blocks below. Manual runs still work via "Run workflow".
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

# Cancel superseded runs on the same ref so the gate stays fast.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: internship_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    env:
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/internship_test"
      NEXTAUTH_SECRET: "ci-test-secret-not-for-production"
      NEXTAUTH_URL: "http://localhost:3000"
      # Seeded admin used by the smoke tests
      SEED_ADMIN_EMAIL: "admin@example.com"
      SEED_ADMIN_PASSWORD: "ChangeMe123!"
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "ChangeMe123!"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply DB schema
        run: npx prisma db push

      - name: Seed admin user
        run: npx prisma db seed

      - name: Build app
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # PR gate runs the @smoke subset only (#623); the FULL suite runs 4x a
      # day via e2e-full.yml (sharded, email on failure) and on demand.
      - name: Run E2E smoke tests
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
